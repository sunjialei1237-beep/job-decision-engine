<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>岗位决策引擎</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #1a1d24;
      --border: #2a2f3a;
      --text: #e6e6e6;
      --muted: #9aa0aa;
      --accent: #4f9cf9;
      --good: #3ecf8e;
      --warn: #f5a524;
      --bad: #f2483d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 24px;
    }
    .wrap { max-width: 880px; margin: 0 auto; }
    h1 { font-size: 1.4rem; font-weight: 600; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }
    form {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: grid;
      gap: 14px;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    label { font-size: 0.85rem; color: var(--muted); }
    input, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.95rem;
      font-family: inherit;
    }
    textarea { min-height: 180px; resize: vertical; }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); }
    button {
      justify-self: start;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 22px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: wait; }
    #out { margin-top: 24px; }
    .loading { color: var(--muted); }
    .error {
      background: rgba(242, 72, 61, 0.12);
      border: 1px solid var(--bad);
      color: var(--bad);
      padding: 12px 16px;
      border-radius: 8px;
    }
    .result {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .head { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .level {
      font-size: 1.6rem; font-weight: 700; padding: 4px 14px; border-radius: 8px;
    }
    .level.S, .level.A { background: rgba(62, 207, 142, 0.15); color: var(--good); }
    .level.B { background: rgba(245, 165, 36, 0.15); color: var(--warn); }
    .level.bad { background: rgba(242, 72, 61, 0.15); color: var(--bad); }
    .score { font-size: 1.1rem; color: var(--muted); }
    .score b { color: var(--text); font-size: 1.4rem; }
    .greeting {
      background: var(--bg);
      border-left: 3px solid var(--accent);
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
      margin: 16px 0;
    }
    .greeting .label { font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; }
    .field { margin: 10px 0; }
    .field .k { font-size: 0.82rem; color: var(--muted); }
    .field .v { margin-top: 2px; }
    details { margin-top: 16px; color: var(--muted); font-size: 0.85rem; }
    summary { cursor: pointer; }
    pre { white-space: pre-wrap; word-break: break-word; font-size: 0.82rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>岗位决策引擎</h1>
    <div class="sub">贴一条 JD → 看穿岗位本质 + 投递等级 + 一句话开场白</div>

    <form id="form">
      <div class="row">
        <div>
          <label for="title">岗位标题</label>
          <input id="title" name="title" required maxlength="200" placeholder="AI 解决方案工程师" />
        </div>
        <div>
          <label for="company">公司</label>
          <input id="company" name="company" required maxlength="200" placeholder="某公司" />
        </div>
      </div>
      <div>
        <label for="jd">JD 正文</label>
        <textarea id="jd" name="jd" required maxlength="20000" placeholder="粘贴 JD 全文..."></textarea>
      </div>
      <button id="btn" type="submit">决策</button>
    </form>

    <div id="out"></div>
  </div>

  <script>
    const form = document.getElementById("form");
    const out = document.getElementById("out");
    const btn = document.getElementById("btn");

    const LEVEL_BAD = new Set(["不建议"]);

    function levelClass(level) {
      if (LEVEL_BAD.has(level)) return "level bad";
      return "level " + level;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      })[c]);
    }

    function render(d) {
      const a = d.analysis;
      const fields = [
        ["direction_reason", "方向理由"],
        ["conclusion", "结论"],
        ["hidden_signal", "隐藏信号"],
        ["ai_relevant", "AI 相关"],
        ["tob", "ToB 相关"],
        ["role_type", "岗位类型"],
        ["skill_migrate", "技能迁移"],
        ["capability_bar", "能力门槛"],
        ["hr_reply_prob", "HR 回复概率"],
        ["recommend", "是否推荐"],
      ]
        .map(([k, label]) =>
          `<div class="field"><div class="k">${label}</div><div class="v">${escapeHtml(a[k])}</div></div>`)
        .join("");
      out.innerHTML = `
        <div class="result">
          <div class="head">
            <span class="${levelClass(d.level)}">${escapeHtml(d.level)}</span>
            <span class="score">评分 <b>${a.score}</b>/10 · 方向 ${escapeHtml(a.direction)}</span>
          </div>
          <div class="greeting">
            <div class="label">开场白(逐条人工发送,勿群发)</div>
            <div>${escapeHtml(d.greeting)}</div>
          </div>
          ${fields}
          <details>
            <summary>完整 JSON</summary>
            <pre>${escapeHtml(JSON.stringify(d, null, 2))}</pre>
          </details>
        </div>`;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      btn.disabled = true;
      out.innerHTML = '<div class="loading">分析中…(约 10 秒,两次 LLM 调用)</div>';
      try {
        const body = {
          title: title.value.trim(),
          company: company.value.trim(),
          jd: jd.value.trim(),
        };
        const r = await fetch("/decide", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.detail || ("HTTP " + r.status));
        render(data);
      } catch (err) {
        out.innerHTML = `<div class="error">失败:${escapeHtml(err.message)}</div>`;
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
