name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ".[api]"

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: Eval pipeline (--fake, 无 LLM key 验证流水线)
        run: python eval/run_eval.py --golden eval/golden.example.jsonl --fake --repeats 1
